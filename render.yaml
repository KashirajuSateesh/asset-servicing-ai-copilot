services:
  - type: web
    name: asset-servicing-ai-copilot-backend
    env: docker
    rootDir: .
    dockerfilePath: ./backend/Dockerfile
    plan: free

    envVars:
      - key: APP_NAME
        value: Asset Servicing AI Copilot API

      - key: APP_ENV
        value: production

      - key: BACKEND_API_BASE_URL
        value: https://asset-servicing-ai-copilot-backend.onrender.com

      - key: COPILOT_API_KEY
        sync: false

      - key: JWT_SECRET_KEY
        sync: false

      - key: JWT_ALGORITHM
        value: HS256

      - key: JWT_EXPIRE_MINUTES
        value: "120"

      - key: AZURE_SQL_SERVER
        sync: false

      - key: AZURE_SQL_DATABASE
        sync: false

      - key: AZURE_SQL_USERNAME
        sync: false

      - key: AZURE_SQL_PASSWORD
        sync: false

      - key: AZURE_SQL_DRIVER
        value: ODBC Driver 18 for SQL Server

      - key: AZURE_STORAGE_ACCOUNT_NAME
        sync: false

      - key: AZURE_STORAGE_CONNECTION_STRING
        sync: false

      - key: AZURE_SEARCH_ENDPOINT
        sync: false

      - key: AZURE_SEARCH_KEY
        sync: false

      - key: AZURE_SEARCH_INDEX_NAME
        value: asset-policy-chunks

      - key: AZURE_COSMOS_ENDPOINT
        sync: false

      - key: AZURE_COSMOS_KEY
        sync: false

      - key: AZURE_COSMOS_DATABASE
        value: asset_copilot_memory

      - key: AZURE_COSMOS_CONTAINER
        value: agent_state

      - key: OPENAI_API_KEY
        sync: false